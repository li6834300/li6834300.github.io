---
layout: myBlogs
---

<article class="post">

  {% if page.preview %}
  <div class="post-banner">
    <img src="{{ site.baseurl }}/images/{{ page.preview }}" alt="{{ page.title }}" class="post-banner-img" />
  </div>
  {% endif %}

  <div class="space-extra-small">
  </div>

  <div class="entry">
    {{ content }}
  </div>

  {% include disqus.html %}
</article>
